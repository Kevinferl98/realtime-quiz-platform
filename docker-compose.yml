services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:18.2-alpine3.22
    container_name: keycloak_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak 
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:8.4.0-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - backend_net

  mongo:
    image: mongo:8.3.4
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_net

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ./observability/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - backend_net

  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
    networks:
      - backend_net

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: alloy
    restart: unless-stopped
    user: "0"
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend_net

  # --- IDENTITY PROVIDER ---
  keycloak:
    image: keycloak/keycloak:26.5
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /identity
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/quiz-realm.json:/opt/keycloak/data/import/quiz-realm.json:ro
      - ./keycloak/themes/modern-quiz:/opt/keycloak/themes/modern-quiz:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/identity`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.docker.network=backend_net"
    depends_on:
      postgres: 
        condition: service_healthy
    networks:
      - backend_net

  # --- BACKEND SERVICES ---
  quiz-service:
    build:
      context: ./backend/quiz_service
      dockerfile: Dockerfile
    container_name: quiz_service
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak:8080/identity
      KEYCLOAK_REALM: quiz
      KEYCLOAK_CLIENT_ID: account
      KEYCLOAK_ISSUER: http://localhost/identity/realms
      MONGO_URI: "mongodb://mongo:27017"
      OTEL_SERVICE_NAME: "quiz_service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quiz.rule=PathPrefix(`/api/quizzes`)"
      - "traefik.http.services.quiz.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.quiz-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.quiz.middlewares=quiz-strip"
      - "traefik.docker.network=backend_net"
    depends_on:
      mongo: 
        condition: service_healthy
      keycloak:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - backend_net

  game-service:
    build: 
      context: ./backend/game_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak:8080/identity
      KEYCLOAK_REALM: quiz
      KEYCLOAK_CLIENT_ID: account
      KEYCLOAK_ISSUER: http://localhost/identity/realms
      OTEL_SERVICE_NAME: "game_service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.game.rule=PathPrefix(`/api/game`) || PathPrefix(`/ws`)"
      - "traefik.http.middlewares.game-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.game.middlewares=game-strip"
      - "traefik.http.services.game.loadbalancer.server.port=8002"
      - "traefik.docker.network=backend_net"
    depends_on:
      redis: 
        condition: service_healthy
      keycloak:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - backend_net
    deploy:
      replicas: 3

  ai-service:
    build:
      context: ./backend/ai_service
      dockerfile: Dockerfile
    container_name: ai_service
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      MODEL_NAME: ${OLLAMA_MODEL_NAME}
      KEYCLOAK_URL: http://keycloak:8080/identity
      KEYCLOAK_REALM: quiz
      KEYCLOAK_CLIENT_ID: account
      KEYCLOAK_ISSUER: http://localhost/identity/realms
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=PathPrefix(`/api/v1/ai`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.ai-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.ai.middlewares=ai-strip"
      - "traefik.docker.network=backend_net"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - backend_net

  # --- FRONTEND ---
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    networks:
      - frontend_net

  # --- API GATEWAY ---
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--tracing=true"
      - "--tracing.otlp=true"
      - "--tracing.otlp.http=false"
      - "--tracing.otlp.grpc.endpoint=tempo:4317"
      - "--tracing.otlp.grpc.insecure=true"
    ports:
      - "80:80"
      - "8085:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - frontend_net
      - backend_net
    
# --- NETWORKS ---
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

# --- VOLUMES ---
volumes:
  redis_data:
  keycloak_db_data:
  mongo_data: