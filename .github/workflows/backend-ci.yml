name: Backend CI

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint: 
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run lint
        run: ruff check backend

  test:
    name: Tests (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_ENV: testing

    strategy:
      fail-fast: false
      matrix:
        service:
          - game_service
          - quiz_service
          - ai_service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt
                
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r backend/${{ matrix.service }}/requirements.txt

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: |
          python -m pytest tests